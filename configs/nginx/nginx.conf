load_module /usr/lib/nginx/modules/ngx_http_brotli_filter_module.so;
load_module /usr/lib/nginx/modules/ngx_http_brotli_static_module.so;

user nginx;
worker_processes auto;

events {
  worker_connections 4096;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  keepalive_timeout 20s;
  keepalive_requests 1000;
  types_hash_max_size 4096;

  server_tokens off;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types
    text/plain text/css application/javascript application/json
    application/xml text/xml image/svg+xml application/rss+xml
    font/woff font/woff2 application/font-woff application/font-woff2;

  brotli on;
  brotli_comp_level 5;
  brotli_min_length 1024;
  brotli_types
    text/plain text/css application/javascript application/json
    application/xml text/xml image/svg+xml application/rss+xml
    font/woff font/woff2 application/font-woff application/font-woff2;

  fastcgi_cache_path /var/cache/nginx/fastcgi levels=1:2 keys_zone=portfolio_microcache:64m inactive=10m max_size=512m;
  fastcgi_cache_key "$scheme$request_method$host$request_uri";

  map $http_cookie $portfolio_bypass_cache {
    default 0;
    ~*(PHPSESSID|sessionid|wordpress_logged_in|wp-postpass|comment_author) 1;
  }

  map $request_method $portfolio_cacheable_method {
    default 0;
    GET 1;
    HEAD 1;
  }

  map $request_uri $portfolio_skip_cache_uri {
    default 0;
    ~^/admin/ 1;
    ~^/admin 1;
    ~^/api 1;
    ~^/health\.php$ 1;
  }

  map $query_string $portfolio_skip_cache_qs {
    default 1;
    '' 0;
  }

  map "$portfolio_cacheable_method:$portfolio_bypass_cache:$portfolio_skip_cache_uri:$portfolio_skip_cache_qs" $portfolio_skip_fastcgi_cache {
    default 1;
    "1:0:0:0" 0;
  }

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '$request_time $upstream_response_time $upstream_addr '
                  '"$http_referer" "$http_user_agent" $upstream_cache_status';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  include /etc/nginx/conf.d/*.conf;
}
