server {
    listen 8081;
    server_name localhost 127.0.0.1 site-a.local;
    resolver 127.0.0.11 valid=10s;
    set $php_upstream portfolio.site-a.app:9000;

    root /var/www/html/site-a;
    index index.php index.html;

    client_max_body_size 64m;

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.php?$args;
    }

    location / {
        try_files $uri $uri/ @pretty_php;
    }

    location @pretty_php {
        rewrite ^/(.+)$ /$1.php last;
    }

    location ~ \.php(?:/|$) {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass $php_upstream;
        fastcgi_read_timeout 300;
    }
}

server {
    listen 8082;
    server_name localhost 127.0.0.1 site-b.local;
    resolver 127.0.0.11 valid=10s;
    set $php_upstream site-b-fpm:9000;

    root /var/www/html/site-b;
    index index.php index.html;

    client_max_body_size 32m;

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS off;
        fastcgi_pass $php_upstream;
        fastcgi_read_timeout 120;
    }
}

